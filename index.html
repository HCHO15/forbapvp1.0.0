<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>シッテムの箱 - forbapvp1.0.0</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
      background: #f5f5f5;
    }
    h1 {
      margin-top: 0;
      font-size: 20px;
    }
    .container {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #canvasWrapper {
      background: #fff;
      padding: 8px;
      border-radius: 4px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
    }
    #mainCanvas {
      border: 1px solid #ccc;
      background: #ffffff;
      cursor: crosshair;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    button {
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .counts {
      margin-top: 4px;
      font-size: 13px;
    }
    .right-panel {
      background: #fff;
      padding: 8px;
      border-radius: 4px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
      min-width: 220px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 8px;
      font-size: 12px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 2px 4px;
      text-align: center;
    }
    th {
      background: #f0f0f0;
    }
    input.coord-input {
      width: 70px;
      font-size: 11px;
      box-sizing: border-box;
    }
    .table-title {
      font-size: 13px;
      font-weight: bold;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <h1>シッテムの箱</h1>
  <div class="container">
    <div class="left-panel">
      <div id="canvasWrapper">
        <canvas id="mainCanvas" width="800" height="600"></canvas>
      </div>
      <div class="counts" id="countsDisplay">
        赤点：0/4　青点：0/4
      </div>
      <div class="controls">
        <button id="btnColor">現在：赤 → 青に切り替え</button>
        <button id="btnReset">リセット</button>
        <button id="btnSave">画像保存</button>
        <button id="btnMode">攻撃SP</button>
      </div>
    </div>
    <div class="right-panel">
      <div class="table-title">赤点座標</div>
      <table>
        <thead>
          <tr><th>#</th><th>x</th><th>y</th></tr>
        </thead>
        <tbody id="redTableBody">
          <!-- rows inserted by JS -->
        </tbody>
      </table>
      <div class="table-title">青点座標</div>
      <table>
        <thead>
          <tr><th>#</th><th>x</th><th>y</th></tr>
        </thead>
        <tbody id="blueTableBody">
          <!-- rows inserted by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // ====== 基本設定 ======
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;
    const originX = width / 2;
    const originY = height / 2;

    const btnColor = document.getElementById('btnColor');
    const btnReset = document.getElementById('btnReset');
    const btnSave = document.getElementById('btnSave');
    const btnMode = document.getElementById('btnMode');
    const countsDisplay = document.getElementById('countsDisplay');
    const redTableBody = document.getElementById('redTableBody');
    const blueTableBody = document.getElementById('blueTableBody');

    const MAX_POINTS = 4;
    const POINT_RADIUS = 10;
    const HIT_RADIUS = 12;

    const COLOR_RED = '#e53935';
    const COLOR_BLUE = '#1e88e5';
    const COLOR_RED_LIGHT = 'rgba(229,57,53,0.35)';
    const COLOR_BLUE_LIGHT = 'rgba(30,136,229,0.35)';

    // modeIndex: 0=攻撃SP,1=バフSP,2=攻撃ST,3=バフST
    const modes = ['攻撃SP', 'バフSP', '攻撃ST', 'バフST'];
    let modeIndex = 0;

    let currentColor = 'red'; // 'red' or 'blue'

    // 点データ: {id:1-4, color:'red'|'blue', x:論理座標, y:論理座標}
    let redPoints = [];
    let bluePoints = [];

    // ドラッグ関連
    let draggingPoint = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let isDragging = false;

    // ST系モードの基準点
    let basePoint = null; // {color, id}

    // ====== 座標変換 ======
    function logicalToCanvas(x, y) {
      return {
        cx: originX + x,
        cy: originY - y
      };
    }

    function canvasToLogical(cx, cy) {
      return {
        x: cx - originX,
        y: originY - cy
      };
    }

    // ====== テーブル初期化 ======
    function initTables() {
      for (let i = 1; i <= MAX_POINTS; i++) {
        const redRow = document.createElement('tr');
        redRow.innerHTML = `
          <td>${i}</td>
          <td><input class="coord-input" data-color="red" data-id="${i}" data-axis="x"></td>
          <td><input class="coord-input" data-color="red" data-id="${i}" data-axis="y"></td>
        `;
        redTableBody.appendChild(redRow);

        const blueRow = document.createElement('tr');
        blueRow.innerHTML = `
          <td>${i}</td>
          <td><input class="coord-input" data-color="blue" data-id="${i}" data-axis="x"></td>
          <td><input class="coord-input" data-color="blue" data-id="${i}" data-axis="y"></td>
        `;
        blueTableBody.appendChild(blueRow);
      }

      document.querySelectorAll('.coord-input').forEach(input => {
        input.addEventListener('change', onCoordInputChange);
      });
    }

    function onCoordInputChange(e) {
      const input = e.target;
      const color = input.dataset.color;
      const id = parseInt(input.dataset.id, 10);
      const axis = input.dataset.axis;
      const value = parseFloat(input.value);

      if (isNaN(value)) return;

      let arr = color === 'red' ? redPoints : bluePoints;
      let point = arr.find(p => p.id === id);

      if (!point) {
        if (arr.length >= MAX_POINTS) {
          // これ以上追加できない
          updateTablesFromPoints();
          return;
        }
        point = { id, color, x: 0, y: 0 };
        arr.push(point);
      }

      point[axis] = value;
      redraw();
      updateTablesFromPoints();
      updateCounts();
    }

    function updateTablesFromPoints() {
      // いったん全クリア
      document.querySelectorAll('.coord-input').forEach(input => {
        input.value = '';
      });

      redPoints.forEach(p => {
        const xInput = document.querySelector(`.coord-input[data-color="red"][data-id="${p.id}"][data-axis="x"]`);
        const yInput = document.querySelector(`.coord-input[data-color="red"][data-id="${p.id}"][data-axis="y"]`);
        if (xInput) xInput.value = Math.round(p.x);
        if (yInput) yInput.value = Math.round(p.y);
      });

      bluePoints.forEach(p => {
        const xInput = document.querySelector(`.coord-input[data-color="blue"][data-id="${p.id}"][data-axis="x"]`);
        const yInput = document.querySelector(`.coord-input[data-color="blue"][data-id="${p.id}"][data-axis="y"]`);
        if (xInput) xInput.value = Math.round(p.x);
        if (yInput) yInput.value = Math.round(p.y);
      });
    }

    // ====== 点操作 ======
    function getNextId(arr) {
      for (let i = 1; i <= MAX_POINTS; i++) {
        if (!arr.find(p => p.id === i)) return i;
      }
      return null;
    }

    function addPoint(color, x, y) {
      const arr = color === 'red' ? redPoints : bluePoints;
      if (arr.length >= MAX_POINTS) return;
      const id = getNextId(arr);
      if (id == null) return;
      arr.push({ id, color, x, y });
    }

    function removePoint(point) {
      if (!point) return;
      if (point.color === 'red') {
        redPoints = redPoints.filter(p => p !== point);
      } else {
        bluePoints = bluePoints.filter(p => p !== point);
      }
      if (basePoint && basePoint.color === point.color && basePoint.id === point.id) {
        basePoint = null;
      }
    }

    function findPointAtCanvasPos(cx, cy) {
      const all = redPoints.concat(bluePoints);
      for (let i = all.length - 1; i >= 0; i--) {
        const p = all[i];
        const { cx: px, cy: py } = logicalToCanvas(p.x, p.y);
        const dx = cx - px;
        const dy = cy - py;
        if (Math.sqrt(dx * dx + dy * dy) <= HIT_RADIUS) {
          return p;
        }
      }
      return null;
    }

    // ====== 描画 ======
    function clearCanvas() {
      ctx.clearRect(0, 0, width, height);
      // 軽いグリッドと原点
      ctx.save();
      ctx.strokeStyle = '#eee';
      ctx.lineWidth = 1;
      for (let x = originX % 50; x < width; x += 50) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      for (let y = originY % 50; y < height; y += 50) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }
      // 軸
      ctx.strokeStyle = '#ccc';
      ctx.beginPath();
      ctx.moveTo(0, originY);
      ctx.lineTo(width, originY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(originX, 0);
      ctx.lineTo(originX, height);
      ctx.stroke();
      ctx.restore();
    }

    function drawPoint(p) {
      const { cx, cy } = logicalToCanvas(p.x, p.y);
      ctx.save();
      ctx.beginPath();
      ctx.fillStyle = p.color === 'red' ? COLOR_RED : COLOR_BLUE;
      ctx.arc(cx, cy, POINT_RADIUS, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 12px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.id.toString(), cx, cy);
      ctx.restore();
    }

    function computeCentroid(points) {
      if (!points.length) return null;
      let sx = 0, sy = 0;
      points.forEach(p => {
        sx += p.x;
        sy += p.y;
      });
      return { x: sx / points.length, y: sy / points.length };
    }

    function drawCentroid(centroid, color) {
      if (!centroid) return;
      const { cx, cy } = logicalToCanvas(centroid.x, centroid.y);
      ctx.save();
      ctx.strokeStyle = color === 'red' ? COLOR_RED_LIGHT : COLOR_BLUE_LIGHT;
      ctx.lineWidth = 2;
      const size = 10;
      ctx.beginPath();
      ctx.moveTo(cx - size, cy - size);
      ctx.lineTo(cx + size, cy + size);
      ctx.moveTo(cx - size, cy + size);
      ctx.lineTo(cx + size, cy - size);
      ctx.stroke();
      ctx.restore();
    }

    function findNearestPoint(from, candidates) {
      if (!candidates.length) return null;
      let best = null;
      let bestDist = Infinity;
      candidates.forEach(p => {
        const dx = p.x - from.x;
        const dy = p.y - from.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < bestDist) {
          bestDist = d2;
          best = p;
        }
      });
      return best;
    }

    function drawCircleAroundPoint(p, color) {
      if (!p) return;
      const { cx, cy } = logicalToCanvas(p.x, p.y);
      ctx.save();
      ctx.strokeStyle = color === 'red' ? COLOR_RED_LIGHT : COLOR_BLUE_LIGHT;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx, cy, POINT_RADIUS + 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function applySubFunction() {
      const redCentroid = computeCentroid(redPoints);
      const blueCentroid = computeCentroid(bluePoints);

      // 常に重心のバツ印
      drawCentroid(redCentroid, 'red');
      drawCentroid(blueCentroid, 'blue');

      if (modeIndex === 0) {
        // 攻撃SP: 赤重心→最も近い青点（赤丸）、青重心→最も近い赤点（青丸）
        if (redCentroid && bluePoints.length) {
          const targetBlue = findNearestPoint(redCentroid, bluePoints);
          drawCircleAroundPoint(targetBlue, 'red');
        }
        if (blueCentroid && redPoints.length) {
          const targetRed = findNearestPoint(blueCentroid, redPoints);
          drawCircleAroundPoint(targetRed, 'blue');
        }
      } else if (modeIndex === 1) {
        // バフSP: 赤重心→最も近い赤点（赤丸）、青重心→最も近い青点（青丸）
        if (redCentroid && redPoints.length) {
          const targetRed = findNearestPoint(redCentroid, redPoints);
          drawCircleAroundPoint(targetRed, 'red');
        }
        if (blueCentroid && bluePoints.length) {
          const targetBlue = findNearestPoint(blueCentroid, bluePoints);
          drawCircleAroundPoint(targetBlue, 'blue');
        }
      } else if (modeIndex === 2) {
        // 攻撃ST: 基準点→最も近い異色の点を基準点の色で囲む
        if (basePoint) {
          const arrSelf = basePoint.color === 'red' ? redPoints : bluePoints;
          const arrOther = basePoint.color === 'red' ? bluePoints : redPoints;
          const self = arrSelf.find(p => p.id === basePoint.id);
          if (self && arrOther.length) {
            const target = findNearestPoint(self, arrOther);
            drawCircleAroundPoint(target, basePoint.color);
          }
        }
      } else if (modeIndex === 3) {
        // バフST: 基準点→最も近い同色の点を基準点の色で囲む
        if (basePoint) {
          const arrSelf = basePoint.color === 'red' ? redPoints : bluePoints;
          const self = arrSelf.find(p => p.id === basePoint.id);
          if (self && arrSelf.length > 1) {
            const candidates = arrSelf.filter(p => p !== self);
            const target = findNearestPoint(self, candidates);
            drawCircleAroundPoint(target, basePoint.color);
          }
        }
      }
    }

    function redraw() {
      clearCanvas();
      redPoints.forEach(drawPoint);
      bluePoints.forEach(drawPoint);
      applySubFunction();
    }

    function updateCounts() {
      countsDisplay.textContent = `赤点：${redPoints.length}/${MAX_POINTS}　青点：${bluePoints.length}/${MAX_POINTS}`;
    }

    // ====== イベント ======
    canvas.addEventListener('contextmenu', e => {
      e.preventDefault();
    });

    canvas.addEventListener('mousedown', e => {
      const rect = canvas.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;

      if (e.button === 0) {
        // 左クリック
        const hit = findPointAtCanvasPos(cx, cy);

        if (hit) {
          // STモードなら基準点設定
          if (modeIndex === 2 || modeIndex === 3) {
            basePoint = { color: hit.color, id: hit.id };
            redraw();
          }
          // ドラッグ開始
          const logical = canvasToLogical(cx, cy);
          dragOffsetX = hit.x - logical.x;
          dragOffsetY = hit.y - logical.y;
          draggingPoint = hit;
          isDragging = true;
        } else {
          // 新規プロット
          const logical = canvasToLogical(cx, cy);
          addPoint(currentColor, logical.x, logical.y);
          redraw();
          updateTablesFromPoints();
          updateCounts();
        }
      } else if (e.button === 2) {
        // 右クリックで削除
        const hit = findPointAtCanvasPos(cx, cy);
        if (hit) {
          removePoint(hit);
          redraw();
          updateTablesFromPoints();
          updateCounts();
        }
      }
    });

    canvas.addEventListener('mousemove', e => {
      if (!isDragging || !draggingPoint) return;
      const rect = canvas.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const logical = canvasToLogical(cx, cy);
      draggingPoint.x = logical.x + dragOffsetX;
      draggingPoint.y = logical.y + dragOffsetY;
      redraw();
      updateTablesFromPoints();
    });

    canvas.addEventListener('mouseup', () => {
      isDragging = false;
      draggingPoint = null;
    });

    canvas.addEventListener('mouseleave', () => {
      isDragging = false;
      draggingPoint = null;
    });

    // ====== ボタン ======
    btnColor.addEventListener('click', () => {
      if (currentColor === 'red') {
        currentColor = 'blue';
        btnColor.textContent = '現在：青 → 赤に切り替え';
      } else {
        currentColor = 'red';
        btnColor.textContent = '現在：赤 → 青に切り替え';
      }
    });

    btnReset.addEventListener('click', () => {
      redPoints = [];
      bluePoints = [];
      basePoint = null;
      redraw();
      updateTablesFromPoints();
      updateCounts();
    });

    btnSave.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'shittomu_no_hako.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    btnMode.addEventListener('click', () => {
      modeIndex = (modeIndex + 1) % modes.length;
      btnMode.textContent = modes[modeIndex];
      basePoint = null; // モード切替時に基準点リセット
      redraw();
    });

    // ====== 初期化 ======
    initTables();
    redraw();
    updateCounts();
  </script>
</body>
</html>
