<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>シッテムの箱 - forbapvp1.0.0</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }
    h1 {
      margin-top: 0;
      font-size: 20px;
    }

    .container {
      display: flex;
      gap: 16px;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 820px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #canvasWrapper {
      background: #fff;
      padding: 8px;
      border-radius: 4px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
    }

    #mainCanvas {
      border: 1px solid #ccc;
      background: #ffffff;
      cursor: crosshair;
    }

    .counts {
      font-size: 13px;
      margin-left: 4px;
    }

    .right-panel {
      background: #fff;
      padding: 8px;
      border-radius: 4px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
      min-width: 260px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 8px;
      font-size: 12px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 2px 4px;
      text-align: center;
    }
    th {
      background: #f0f0f0;
    }
    input.coord-input {
      width: 60px;
      font-size: 11px;
    }
    .table-title {
      font-size: 13px;
      font-weight: bold;
      margin: 4px 0;
    }

    .slider-label {
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>シッテムの箱</h1>

  <div class="container">
    <div class="left-panel">

      <!-- ボタン -->
      <div class="controls">
        <button id="btnColor">現在：赤 → 青に切り替え</button>
        <button id="btnReset">リセット</button>
        <button id="btnSave">画像保存</button>
        <button id="btnZoom">背景の拡大・縮小</button>

        <!-- プルダウン（サブ機能） -->
        <select id="modeSelect">
          <option value="0">攻撃SP</option>
          <option value="1">バフSP</option>
          <option value="2">攻撃ST</option>
          <option value="3">バフST</option>
        </select>
      </div>

      <!-- 透過度スライダー -->
      <div class="slider-label">遮蔽画像の透過度</div>
      <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.9">

      <!-- 点カウント -->
      <div class="counts" id="countsDisplay">
        赤点：0/4　青点：0/4
      </div>

      <!-- キャンバス -->
      <div id="canvasWrapper">
        <canvas id="mainCanvas" width="800" height="520"></canvas>
      </div>

    </div>

    <!-- 座標表 -->
    <div class="right-panel">
      <div class="table-title">赤点座標</div>
      <table>
        <thead>
          <tr><th>#</th><th>x</th><th>y</th><th>基準</th></tr>
        </thead>
        <tbody id="redTableBody"></tbody>
      </table>

      <div class="table-title">青点座標</div>
      <table>
        <thead>
          <tr><th>#</th><th>x</th><th>y</th><th>基準</th></tr>
        </thead>
        <tbody id="blueTableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    /* =========================
       基本設定
    ========================== */
    const canvas = document.getElementById("mainCanvas");
    const ctx = canvas.getContext("2d");
    const width = canvas.width;
    const height = canvas.height;

    const Y_MARGIN = 40;
    const originX = width / 2;
    const originY = height / 2;

    const btnColor = document.getElementById("btnColor");
    const btnReset = document.getElementById("btnReset");
    const btnSave = document.getElementById("btnSave");
    const btnZoom = document.getElementById("btnZoom");
    const modeSelect = document.getElementById("modeSelect");
    const opacitySlider = document.getElementById("opacitySlider");
    const countsDisplay = document.getElementById("countsDisplay");

    const redTableBody = document.getElementById("redTableBody");
    const blueTableBody = document.getElementById("blueTableBody");

    const MAX_POINTS = 4;
    const POINT_RADIUS = 10;
    const HIT_RADIUS = 12;

    const COLOR_RED = "#e53935";
    const COLOR_BLUE = "#1e88e5";
    const COLOR_RED_LIGHT = "rgba(229,57,53,0.35)";
    const COLOR_BLUE_LIGHT = "rgba(30,136,229,0.35)";

    let modeIndex = 0;
    let currentColor = "red";

    let redPoints = [];
    let bluePoints = [];

    let draggingPoint = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let isDragging = false;

    let basePoint = null;

    /* 背景倍率（1.0 または 1.5） */
    let bgScaleMultiplier = 1.0;

    /* 背景画像（後面） */
    const bgImage = new Image();
    bgImage.src = "S10 map.png";
    let bgLoaded = false;
    bgImage.onload = () => { bgLoaded = true; redraw(); };

    /* 背景画像（前面：遮蔽） */
    const bgImage2 = new Image();
    bgImage2.src = "S10 map 遮蔽.png";
    let bg2Loaded = false;
    bgImage2.onload = () => { bg2Loaded = true; redraw(); };

    /* =========================
       座標変換（背景倍率に同期）
    ========================== */
    function logicalToCanvas(x, y) {
      return {
        cx: originX + x * bgScaleMultiplier,
        cy: originY - y * bgScaleMultiplier
      };
    }

    function canvasToLogical(cx, cy) {
      return {
        x: (cx - originX) / bgScaleMultiplier,
        y: (originY - cy) / bgScaleMultiplier
      };
    }
        /* =========================
       描画
    ========================== */
    function clearCanvas() {
      ctx.clearRect(0, 0, width, height);

      /* 背景画像（後面） */
      if (bgLoaded) {
        const scale = Math.min(width / 3567, height / 2400) * bgScaleMultiplier;
        const w = 3567 * scale;
        const h = 2400 * scale;
        const x = (width - w) / 2;
        const y = (height - h) / 2;

        ctx.save();
        ctx.globalAlpha = 0.8;
        ctx.drawImage(bgImage, x, y, w, h);
        ctx.restore();
      }

      /* 背景画像（前面：遮蔽） */
      if (bg2Loaded) {
        const scale = Math.min(width / 3567, height / 2400) * bgScaleMultiplier;
        const w = 3567 * scale;
        const h = 2400 * scale;
        const x = (width - w) / 2;
        const y = (height - h) / 2;

        ctx.save();
        ctx.globalAlpha = parseFloat(opacitySlider.value);
        ctx.drawImage(bgImage2, x, y, w, h);
        ctx.restore();
      }

      /* グリッド（背景倍率に同期） */
      ctx.save();
      ctx.strokeStyle = "#eee";

      const gridStep = 50 * bgScaleMultiplier;

      for (let gx = originX % gridStep; gx < width; gx += gridStep) {
        ctx.beginPath();
        ctx.moveTo(gx, 0);
        ctx.lineTo(gx, height);
        ctx.stroke();
      }

      for (let gy = originY % gridStep; gy < height; gy += gridStep) {
        ctx.beginPath();
        ctx.moveTo(0, gy);
        ctx.lineTo(width, gy);
        ctx.stroke();
      }

      /* 軸（背景倍率に同期） */
      ctx.strokeStyle = "#ccc";

      ctx.beginPath();
      ctx.moveTo(0, originY);
      ctx.lineTo(width, originY);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(originX, 0);
      ctx.lineTo(originX, height);
      ctx.stroke();

      ctx.restore();
    }

    function drawPoint(p) {
      const { cx, cy } = logicalToCanvas(p.x, p.y);
      ctx.save();
      ctx.beginPath();
      ctx.fillStyle = p.color === "red" ? COLOR_RED : COLOR_BLUE;
      ctx.arc(cx, cy, POINT_RADIUS, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fff";
      ctx.font = "bold 12px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(p.id, cx, cy);
      ctx.restore();
    }

    function computeCentroid(arr) {
      if (!arr.length) return null;
      let sx = 0, sy = 0;
      arr.forEach(p => { sx += p.x; sy += p.y; });
      return { x: sx / arr.length, y: sy / arr.length };
    }

    function drawCentroid(c, color) {
      if (!c) return;
      const { cx, cy } = logicalToCanvas(c.x, c.y);
      ctx.save();
      ctx.strokeStyle = color === "red" ? COLOR_RED_LIGHT : COLOR_BLUE_LIGHT;
      ctx.lineWidth = 2;
      const s = 10;
      ctx.beginPath();
      ctx.moveTo(cx - s, cy - s);
      ctx.lineTo(cx + s, cy + s);
      ctx.moveTo(cx - s, cy + s);
      ctx.lineTo(cx + s, cy - s);
      ctx.stroke();
      ctx.restore();
    }

    function findNearestPoint(from, arr) {
      if (!arr.length) return null;
      let best = null;
      let bestDist = Infinity;
      arr.forEach(p => {
        const dx = p.x - from.x;
        const dy = p.y - from.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < bestDist) {
          bestDist = d2;
          best = p;
        }
      });
      return best;
    }

    function drawCircleAroundPoint(p, color) {
      if (!p) return;
      const { cx, cy } = logicalToCanvas(p.x, p.y);
      ctx.save();
      ctx.strokeStyle = color === "red" ? COLOR_RED_LIGHT : COLOR_BLUE_LIGHT;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx, cy, POINT_RADIUS + 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function applySubFunction() {
      const redC = computeCentroid(redPoints);
      const blueC = computeCentroid(bluePoints);

      drawCentroid(redC, "red");
      drawCentroid(blueC, "blue");

      if (modeIndex === 0) {
        if (redC && bluePoints.length) {
          drawCircleAroundPoint(findNearestPoint(redC, bluePoints), "red");
        }
        if (blueC && redPoints.length) {
          drawCircleAroundPoint(findNearestPoint(blueC, redPoints), "blue");
        }
      }

      if (modeIndex === 1) {
        if (redC && redPoints.length) {
          drawCircleAroundPoint(findNearestPoint(redC, redPoints), "red");
        }
        if (blueC && bluePoints.length) {
          drawCircleAroundPoint(findNearestPoint(blueC, bluePoints), "blue");
        }
      }

      if (modeIndex === 2 && basePoint) {
        const arrSelf = basePoint.color === "red" ? redPoints : bluePoints;
        const arrOther = basePoint.color === "red" ? bluePoints : redPoints;
        const self = arrSelf.find(p => p.id === basePoint.id);
        if (self && arrOther.length) {
          drawCircleAroundPoint(findNearestPoint(self, arrOther), basePoint.color);
        }
      }

      if (modeIndex === 3 && basePoint) {
        const arrSelf = basePoint.color === "red" ? redPoints : bluePoints;
        const self = arrSelf.find(p => p.id === basePoint.id);
        if (self && arrSelf.length > 1) {
          const candidates = arrSelf.filter(p => p !== self);
          drawCircleAroundPoint(findNearestPoint(self, candidates), basePoint.color);
        }
      }
    }

    function redraw() {
      clearCanvas();
      redPoints.forEach(drawPoint);
      bluePoints.forEach(drawPoint);
      applySubFunction();
    }

    function updateCounts() {
      countsDisplay.textContent =
        `赤点：${redPoints.length}/${MAX_POINTS}　青点：${bluePoints.length}/${MAX_POINTS}`;
    }

    /* =========================
       イベント
    ========================== */
    canvas.addEventListener("contextmenu", e => e.preventDefault());

    canvas.addEventListener("mousedown", e => {
      const rect = canvas.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;

      if (e.button === 0) {
        const hit = findPointAtCanvasPos(cx, cy);

        if (hit) {
          const logical = canvasToLogical(cx, cy);
          dragOffsetX = hit.x - logical.x;
          dragOffsetY = hit.y - logical.y;
          draggingPoint = hit;
          isDragging = true;
        } else {
          const logical = canvasToLogical(cx, cy);
          addPoint(currentColor, logical.x, logical.y);
          redraw();
          updateTablesFromPoints();
          updateCounts();
        }
      }

      if (e.button === 2) {
        const hit = findPointAtCanvasPos(cx, cy);
        if (hit) {
          removePoint(hit);
          redraw();
          updateTablesFromPoints();
          updateCounts();
        }
      }
    });

    canvas.addEventListener("mousemove", e => {
      if (!isDragging || !draggingPoint) return;
      const rect = canvas.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const logical = canvasToLogical(cx, cy);
      draggingPoint.x = logical.x + dragOffsetX;
      draggingPoint.y = logical.y + dragOffsetY;
      redraw();
      updateTablesFromPoints();
    });

    canvas.addEventListener("mouseup", () => {
      isDragging = false;
      draggingPoint = null;
    });

    canvas.addEventListener("mouseleave", () => {
      isDragging = false;
      draggingPoint = null;
    });

    /* =========================
       ボタン・スライダー
    ========================== */
    btnColor.addEventListener("click", () => {
      if (currentColor === "red") {
        currentColor = "blue";
        btnColor.textContent = "現在：青 → 赤に切り替え";
      } else {
        currentColor = "red";
        btnColor.textContent = "現在：赤 → 青に切り替え";
      }
    });

    btnReset.addEventListener("click", () => {
      redPoints = [];
      bluePoints = [];
      basePoint = null;
      redraw();
      updateTablesFromPoints();
      updateCounts();
    });

    btnSave.addEventListener("click", () => {
      const link = document.createElement("a");
      link.download = "shittomu_no_hako.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });

    /* 背景拡大・縮小 */
    btnZoom.addEventListener("click", () => {
      bgScaleMultiplier = (bgScaleMultiplier === 1.0) ? 1.5 : 1.0;
      redraw();
    });

    /* 透過度スライダー */
    opacitySlider.addEventListener("input", () => {
      redraw();
    });

    /* プルダウンでモード切替 */
    modeSelect.addEventListener("change", () => {
      modeIndex = parseInt(modeSelect.value, 10);
      basePoint = null;
      redraw();
    });

    /* =========================
       初期化
    ========================== */
    initTables();
    redraw();
    updateCounts();
  </script>
</body>
</html>
