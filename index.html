<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>シッテムの箱 - forbapvp1.0.0</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }
    h1 {
      margin-top: 0;
      font-size: 20px;
    }

    .container {
      display: flex;
      gap: 16px;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 820px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #canvasWrapper {
      background: #fff;
      padding: 8px;
      border-radius: 4px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
    }

    #mainCanvas {
      border: 1px solid #ccc;
      background: #ffffff;
      cursor: crosshair;
    }

    .counts {
      font-size: 13px;
      margin-left: 4px;
    }

    .right-panel {
      background: #fff;
      padding: 8px;
      border-radius: 4px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
      min-width: 260px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 8px;
      font-size: 12px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 2px 4px;
      text-align: center;
    }
    th {
      background: #f0f0f0;
    }

    /* 範囲攻撃 UI */
    #rangeControls {
      display: none;
      margin-top: 6px;
      font-size: 12px;
    }
    #rangeControls input, #rangeControls select {
      margin-left: 4px;
    }
  </style>
</head>

<body>
  <h1>シッテムの箱</h1>

  <div class="container">
    <div class="left-panel">

      <!-- ボタン -->
      <div class="controls">
        <button id="btnColor">現在：赤 → 青に切り替え</button>
        <button id="btnReset">リセット</button>
        <button id="btnSave">画像保存</button>

        <select id="modeSelect">
          <option value="0">攻撃SP</option>
          <option value="1">バフSP</option>
          <option value="2">攻撃ST</option>
          <option value="3">バフST</option>
          <option value="4">範囲攻撃</option>
        </select>
      </div>

      <!-- 範囲攻撃 UI -->
      <div id="rangeControls">
        <div>
          半径(m)：
          <input type="range" id="radiusSlider" min="350" max="1000" step="10" value="700">
          <span id="radiusValue">700</span>

          <select id="shortcutSelect">
            <option value="manual">手動</option>
            <option value="tsubaki">ツバキEX</option>
            <option value="hanako">ハナコ（水着）EX</option>
            <option value="hoshinoEX">ホシノ（臨戦）EX</option>
            <option value="hoshinoSS">ホシノ（臨戦）SS</option>
            <option value="yakumo">ヤクモEX</option>
          </select>
        </div>

        <div>
          角度(°)：
          <input type="number" id="angleInput" min="1" max="360" value="360">
        </div>
      </div>

      <div class="counts" id="countsDisplay">
        赤点：0/4　青点：0/4
      </div>

      <div id="canvasWrapper">
        <canvas id="mainCanvas" width="800" height="520"></canvas>
      </div>

    </div>

    <!-- 座標表 -->
    <div class="right-panel">
      <div class="table-title">赤点座標</div>
      <table>
        <thead>
          <tr><th>#</th><th>x</th><th>y</th><th>基準</th></tr>
        </thead>
        <tbody id="redTableBody"></tbody>
      </table>

      <div class="table-title">青点座標</div>
      <table>
        <thead>
          <tr><th>#</th><th>x</th><th>y</th><th>基準</th></tr>
        </thead>
        <tbody id="blueTableBody"></tbody>
      </table>
    </div>
  </div>

<script>
/* =========================
   基本設定
========================= */
const canvas = document.getElementById("mainCanvas");
const ctx = canvas.getContext("2d");
const width = canvas.width;
const height = canvas.height;

const originX = width / 2;
const originY = height / 2;

const btnColor = document.getElementById("btnColor");
const btnReset = document.getElementById("btnReset");
const btnSave = document.getElementById("btnSave");
const modeSelect = document.getElementById("modeSelect");

const rangeControls = document.getElementById("rangeControls");
const radiusSlider = document.getElementById("radiusSlider");
const radiusValue = document.getElementById("radiusValue");
const angleInput = document.getElementById("angleInput");
const shortcutSelect = document.getElementById("shortcutSelect");

const countsDisplay = document.getElementById("countsDisplay");
const redTableBody = document.getElementById("redTableBody");
const blueTableBody = document.getElementById("blueTableBody");

const MAX_POINTS = 4;
const POINT_RADIUS = 10;
const HIT_RADIUS = 12;

const COLOR_RED = "#e53935";
const COLOR_BLUE = "#1e88e5";
const COLOR_RED_LIGHT = "rgba(229,57,53,0.35)";
const COLOR_BLUE_LIGHT = "rgba(30,136,229,0.35)";

let modeIndex = 0;
let currentColor = "red";

let redPoints = [];
let bluePoints = [];

let draggingPoint = null;
let dragOffsetX = 0;
let dragOffsetY = 0;
let isDragging = false;

let basePoint = null;

/* 背景画像 */
const bgImage = new Image();
bgImage.src = "S10 map.png";
let bgLoaded = false;
bgImage.onload = () => { bgLoaded = true; redraw(); };

const bgImage2 = new Image();
bgImage2.src = "S10 map 遮蔽.png";
let bg2Loaded = false;
bgImage2.onload = () => { bg2Loaded = true; redraw(); };

/* =========================
   座標変換
========================= */
function logicalToCanvas(x, y) {
  return {
    cx: originX + x,
    cy: originY - y
  };
}

function canvasToLogical(cx, cy) {
  return {
    x: cx - originX,
    y: originY - cy
  };
}

/* =========================
   描画ユーティリティ
========================= */
function drawCircle(cx, cy, r, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawCross(cx, cy, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  const s = 10;
  ctx.beginPath();
  ctx.moveTo(cx - s, cy - s);
  ctx.lineTo(cx + s, cy + s);
  ctx.moveTo(cx - s, cy + s);
  ctx.lineTo(cx + s, cy - s);
  ctx.stroke();
  ctx.restore();
}

/* =========================
   重心
========================= */
function computeCentroid(arr) {
  if (!arr.length) return null;
  let sx = 0, sy = 0;
  arr.forEach(p => { sx += p.x; sy += p.y; });
  return { x: sx / arr.length, y: sy / arr.length };
}

/* =========================
   背景描画
========================= */
function clearCanvas() {
  ctx.clearRect(0, 0, width, height);

  if (bgLoaded) {
    const scale = Math.min(width / 3567, height / 2400) * 1.5;
    const w = 3567 * scale;
    const h = 2400 * scale;
    const x = (width - w) / 2;
    const y = (height - h) / 2;

    ctx.save();
    ctx.globalAlpha = 0.8;
    ctx.drawImage(bgImage, x, y, w, h);
    ctx.restore();
  }

  if (bg2Loaded) {
    const scale = Math.min(width / 3567, height / 2400) * 1.5;
    const w = 3567 * scale;
    const h = 2400 * scale;
    const x = (width - w) / 2;
    const y = (height - h) / 2;

    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.drawImage(bgImage2, x, y, w, h);
    ctx.restore();
  }
}

/* =========================
   点描画
========================= */
function drawPoint(p) {
  const { cx, cy } = logicalToCanvas(p.x, p.y);
  ctx.save();
  ctx.beginPath();
  ctx.fillStyle = p.color === "red" ? COLOR_RED : COLOR_BLUE;
  ctx.arc(cx, cy, POINT_RADIUS, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#fff";
  ctx.font = "bold 12px system-ui";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(p.id, cx, cy);
  ctx.restore();
}

/* =========================
   距離計算ユーティリティ
========================= */
function dist2(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return dx * dx + dy * dy;
}

/* =========================
   最も近い点を返す
========================= */
function findNearest(from, arr) {
  if (!arr.length) return null;

  let best = null;
  let bestD = Infinity;

  arr.forEach(p => {
    const d = dist2(from, p);
    if (d < bestD) {
      bestD = d;
      best = p;
    }
  });

  return best;
}

/* =========================
   囲み丸を描く（薄色）
========================= */
function drawHighlightCircle(point, color) {
  if (!point) return;
  const { cx, cy } = logicalToCanvas(point.x, point.y);
  drawCircle(cx, cy, POINT_RADIUS + 8, color);
}

/* =========================
   重心バツ印（薄色）
========================= */
function drawCentroidMark(arr, colorLight) {
  const c = computeCentroid(arr);
  if (!c) return;
  const { cx, cy } = logicalToCanvas(c.x, c.y);
  drawCross(cx, cy, colorLight);
}

/* =========================
   サブ機能1：攻撃SP
   赤重心 → 最も近い青点を赤丸
   青重心 → 最も近い赤点を青丸
========================= */
function applyAttackSP() {
  const redC = computeCentroid(redPoints);
  const blueC = computeCentroid(bluePoints);

  if (redC && bluePoints.length) {
    const nearestBlue = findNearest(redC, bluePoints);
    drawHighlightCircle(nearestBlue, COLOR_RED_LIGHT);
  }

  if (blueC && redPoints.length) {
    const nearestRed = findNearest(blueC, redPoints);
    drawHighlightCircle(nearestRed, COLOR_BLUE_LIGHT);
  }
}

/* =========================
   サブ機能2：バフSP
   赤重心 → 最も近い赤点を赤丸
   青重心 → 最も近い青点を青丸
========================= */
function applyBuffSP() {
  const redC = computeCentroid(redPoints);
  const blueC = computeCentroid(bluePoints);

  if (redC && redPoints.length >= 2) {
    const nearestRed = findNearest(redC, redPoints);
    drawHighlightCircle(nearestRed, COLOR_RED_LIGHT);
  }

  if (blueC && bluePoints.length >= 2) {
    const nearestBlue = findNearest(blueC, bluePoints);
    drawHighlightCircle(nearestBlue, COLOR_BLUE_LIGHT);
  }
}

/* =========================
   サブ機能3：攻撃ST
   基準点 → 最も近い異色の点を囲む
========================= */
function applyAttackST() {
  if (!basePoint) return;

  const arrSelf = basePoint.color === "red" ? redPoints : bluePoints;
  const arrOther = basePoint.color === "red" ? bluePoints : redPoints;

  const self = arrSelf.find(p => p.id === basePoint.id);
  if (!self || !arrOther.length) return;

  const nearest = findNearest(self, arrOther);
  const color = basePoint.color === "red" ? COLOR_RED_LIGHT : COLOR_BLUE_LIGHT;

  drawHighlightCircle(nearest, color);
}

/* =========================
   サブ機能4：バフST
   基準点 → 最も近い同色の点を囲む
========================= */
function applyBuffST() {
  if (!basePoint) return;

  const arrSelf = basePoint.color === "red" ? redPoints : bluePoints;
  const self = arrSelf.find(p => p.id === basePoint.id);
  if (!self || arrSelf.length < 2) return;

  const others = arrSelf.filter(p => p.id !== basePoint.id);
  const nearest = findNearest(self, others);

  const color = basePoint.color === "red" ? COLOR_RED_LIGHT : COLOR_BLUE_LIGHT;
  drawHighlightCircle(nearest, color);
}

/* =========================
   applySubFunction() 完全版
========================= */
function applySubFunction() {
  /* 常に重心バツ印を描画（薄色） */
  drawCentroidMark(redPoints, COLOR_RED_LIGHT);
  drawCentroidMark(bluePoints, COLOR_BLUE_LIGHT);

  if (modeIndex === 0) applyAttackSP();
  if (modeIndex === 1) applyBuffSP();
  if (modeIndex === 2) applyAttackST();
  if (modeIndex === 3) applyBuffST();
  if (modeIndex === 4) drawRangeAttack();  // 既存の範囲攻撃
}

/* =========================
   点追加・削除・ドラッグ（PC）
========================= */
canvas.addEventListener("contextmenu", e => e.preventDefault());

canvas.addEventListener("mousedown", e => {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;

  const hit = findPointAtCanvasPos(cx, cy);

  /* 左クリック */
  if (e.button === 0) {

    /* サブ機能 ST 系（攻撃ST / バフST）では再クリックで基準点にする */
    if (hit && (modeIndex === 2 || modeIndex === 3)) {
      basePoint = { color: hit.color, id: hit.id };
      redraw();
      return;
    }

    /* ドラッグ開始 */
    if (hit) {
      const logical = canvasToLogical(cx, cy);
      dragOffsetX = hit.x - logical.x;
      dragOffsetY = hit.y - logical.y;
      draggingPoint = hit;
      isDragging = true;
      return;
    }

    /* 新規追加 */
    const logical = canvasToLogical(cx, cy);
    addPoint(currentColor, logical.x, logical.y);
    redraw();
    updateTablesFromPoints();
    updateCounts();
  }

  /* 右クリック → 削除 */
  if (e.button === 2 && hit) {
    removePoint(hit);
    redraw();
    updateTablesFromPoints();
    updateCounts();
  }
});

canvas.addEventListener("mousemove", e => {
  if (!isDragging || !draggingPoint) return;

  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;

  const logical = canvasToLogical(cx, cy);
  draggingPoint.x = logical.x + dragOffsetX;
  draggingPoint.y = logical.y + dragOffsetY;

  redraw();
  updateTablesFromPoints();
});

canvas.addEventListener("mouseup", () => {
  isDragging = false;
  draggingPoint = null;
});

canvas.addEventListener("mouseleave", () => {
  isDragging = false;
  draggingPoint = null;
});

/* =========================
   ボタン
========================= */
btnColor.addEventListener("click", () => {
  if (currentColor === "red") {
    currentColor = "blue";
    btnColor.textContent = "現在：青 → 赤に切り替え";
  } else {
    currentColor = "red";
    btnColor.textContent = "現在：赤 → 青に切り替え";
  }
});

btnReset.addEventListener("click", () => {
  redPoints = [];
  bluePoints = [];
  basePoint = null;
  redraw();
  updateTablesFromPoints();
  updateCounts();
});

btnSave.addEventListener("click", () => {
  const link = document.createElement("a");
  link.download = "shittomu_no_hako.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
});

/* =========================
   サブ機能切り替え
========================= */
modeSelect.addEventListener("change", () => {
  modeIndex = parseInt(modeSelect.value, 10);

  /* ST 系は基準点をリセット */
  if (modeIndex === 2 || modeIndex === 3) {
    basePoint = null;
  }

  /* 範囲攻撃 UI の表示切替 */
  if (modeIndex === 4) {
    rangeControls.style.display = "block";
  } else {
    rangeControls.style.display = "none";
  }

  redraw();
});

/* =========================
   範囲攻撃 UI
========================= */
radiusSlider.addEventListener("input", () => {
  radiusValue.textContent = radiusSlider.value;
  shortcutSelect.value = "manual";
  redraw();
});

angleInput.addEventListener("input", () => {
  shortcutSelect.value = "manual";
  redraw();
});

/* ショートカット */
shortcutSelect.addEventListener("change", () => {
  const v = shortcutSelect.value;

  if (v === "tsubaki") {
    radiusSlider.value = 700;
    angleInput.value = 360;
  }
  if (v === "hanako") {
    radiusSlider.value = 850;
    angleInput.value = 60;
  }
  if (v === "hoshinoEX") {
    radiusSlider.value = 300;
    angleInput.value = 360;
  }
  if (v === "hoshinoSS") {
    radiusSlider.value = 850;
    angleInput.value = 30;
  }
  if (v === "yakumo") {
    radiusSlider.value = 510;
    angleInput.value = 360;
  }

  radiusValue.textContent = radiusSlider.value;
  redraw();
});

/* =========================
   座標入力テーブル
========================= */
function updateCounts() {
  countsDisplay.textContent =
    `赤点：${redPoints.length}/${MAX_POINTS}　青点：${bluePoints.length}/${MAX_POINTS}`;
}

/* =========================
   初期化
========================= */
initTables();
redraw();
updateTablesFromPoints();
updateCounts();

</script>
</body>
</html>
